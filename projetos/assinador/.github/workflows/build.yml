name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  GO_VERSION: '1.21'
  REPO_NAME: 'assinatura'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        goarch: [amd64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build
      run: |
        CGO_ENABLED=0 GOOS=${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'windows-latest' && 'windows' || 'darwin' }} GOARCH=${{ matrix.goarch }} go build -o ${{ env.REPO_NAME }}-${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'windows-latest' && 'windows' || 'darwin' }}-${{ matrix.goarch }}
      working-directory: ./assinatura

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.REPO_NAME }}-${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'windows-latest' && 'windows' || 'darwin' }}-${{ matrix.goarch }}
        path: ./assinatura/${{ env.REPO_NAME }}-${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'windows-latest' && 'windows' || 'darwin' }}-${{ matrix.goarch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List downloaded artifacts
      run: ls -R artifacts

    - name: Create SHA256 checksums
      run: |
        cd artifacts
        for dir in *; do
          if [ -d "$dir" ]; then
            cd "$dir"
            sha256sum * > "../${dir}.sha256"
            cd ..
          fi
        done
        ls -R

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.5.0

    - name: Cosign setup
      run: |
        echo "COSIGN_EXPERIMENTAL=true" >> $GITHUB_ENV

    - name: Sign artifacts with Cosign
      run: |
        cd artifacts
        for dir in *; do
          if [ -d "$dir" ]; then
            cd "$dir"
            for file in *; do
              cosign sign-blob --output-signature "${file}.sig" --output-certificate "${file}.pem" "${file}"
            done
            cd ..
          fi
        done
      env:
        COSIGN_EXPERIMENTAL: "true"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/*/*.sha256
          artifacts/*/*.sig
          artifacts/*/*.pem
          artifacts/*/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
