name: Assinatura CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: assinatura
  GO_VERSION: "1.25.x"
  MODULE_DIR: projetos/assinador

jobs:
  test:
    name: Go Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.sum

      - name: Run tests
        working-directory: ${{ env.MODULE_DIR }}
        run: go test ./...

  java:
    name: Java Tests and Jar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test and package assinador.jar
        working-directory: projetos/assinador-java
        run: mvn --batch-mode clean verify

      - name: Upload assinador.jar
        uses: actions/upload-artifact@v4
        with:
          name: assinador-jar
          path: projetos/assinador-java/target/assinador.jar
          if-no-files-found: error

  integration:
    name: CLI to Jar Integration
    runs-on: ubuntu-latest
    needs:
      - test
      - java
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.sum

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download assinador.jar
        uses: actions/download-artifact@v4
        with:
          name: assinador-jar
          path: ${{ env.MODULE_DIR }}

      - name: Exercise sign and validate locally
        working-directory: ${{ env.MODULE_DIR }}
        run: |
          set -euo pipefail

          timestamp="$(date +%s)"
          sign_output="$(go run . sign \
            --bundle '{"resourceType":"Bundle","entry":[{}]}' \
            --provenance '{"resourceType":"Provenance","target":[{"reference":"urn:uuid:abc"}]}' \
            --credential-content 'test-key' \
            --certificate-chain '["cert1","cert2"]' \
            --timestamp "${timestamp}")"

          signature_data="$(printf '%s\n' "${sign_output}" | tail -n 1)"
          test -n "${signature_data}"

          go run . validate \
            --signature-data "${signature_data}" \
            --timestamp "${timestamp}"

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: integration
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            extension: ""
          - goos: windows
            goarch: amd64
            extension: ".exe"
          - goos: darwin
            goarch: amd64
            extension: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.sum

      - name: Build binary
        working-directory: ${{ env.MODULE_DIR }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXTENSION: ${{ matrix.extension }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            version="dev-${GITHUB_SHA::7}"
          fi

          binary="${APP_NAME}-${version}-${GOOS}-${GOARCH}${EXTENSION}"
          mkdir -p dist

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X github.com/heitor-barbosa/runner/projetos/assinador/cmd.Version=${version}" \
            -o "dist/${binary}" \
            .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.MODULE_DIR }}/dist/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
      - java
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download assinador.jar
        uses: actions/download-artifact@v4
        with:
          name: assinador-jar
          path: release

      - name: Prepare release files
        run: |
          set -euo pipefail

          mkdir -p release
          find artifacts -type f -name "${APP_NAME}-*" -exec cp {} release/ \;

          cd release
          sha256sum ${APP_NAME}-* assinador.jar > SHA256SUMS.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.2

      - name: Sign binaries with Cosign
        working-directory: release
        run: |
          set -euo pipefail

          for file in ${APP_NAME}-* assinador.jar; do
            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "${file}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
